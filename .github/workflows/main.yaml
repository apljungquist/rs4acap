name: "Main"
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      acap-build: ${{ steps.filter.outputs.acap-build }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            acap-build:
              - '.github/**'
              - 'crates/acap-build/**'
              - 'crates/acap-build-tester/**'
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v14
        with:
          name: apljungquist-rs4a
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Install dependencies
        run: nix develop --ignore-env --command make
      - name: Run checks
        run: nix develop --ignore-env --command make check
      - name: Check flake
        if: github.event_name == 'push'
        run: nix flake check
  checks-macos:
    needs: checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Run checks (portable)
        run: make check_t3
  checks-container:
    needs:
      - changes
      - checks
      - checks-macos
    if: needs.changes.outputs.acap-build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        tag:
          # Keep the versions in sync with:
          # - .devcontainer/acap-native-sdk-12-aarch64/devcontainer.json
          # - .devcontainer/acap-native-sdk-12-armv7hf/devcontainer.json
          # - .github/workflows/fuzz.yaml
          # - bin/create-venv.sh
          # - nix/acap-native-sdk.nix
          - 12.11.0-aarch64-ubuntu24.04
          - 12.11.0-armv7hf-ubuntu24.04
          - 13.0.0-preview-aarch64-ubuntu25.10
          - 13.0.0-preview-armv7hf-ubuntu25.10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build the dev container image
        run: |
          docker build \
            --build-arg TAG=${{ matrix.tag }} \
            --file .devcontainer/Dockerfile \
            --tag devcontainer \
            .devcontainer
      - name: Run checks (tier 1)
        run: |
          docker run --rm --volume "$PWD:/work" --workdir /work devcontainer \
            bash -c '. /opt/axis/acapsdk/environment-setup-* && make replay_equivalence_examples fuzz_equivalence'
